<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | block-cot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #3b82f6;
        }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: 80px; margin-bottom: 20px; }
        p { margin-bottom: 30px; color: #6b7280; }
        a { color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 10px 20px; border-radius: 30px; transition: 0.3s; }
        a:hover { background: #3b82f6; color: white; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%,50%{opacity:1}51%,100%{opacity:0} }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>$ cat /page/not/found<br>No such file or directory<span class="cursor">_</span></p>
        <a href="/">cd /home</a>
    </div>
</body>
</html>
